<div class="mt-4">
  <h2 class="mb-4 fw-bold">🔥 Destinos Populares</h2>

  <div class="row">
    
    @for (destino of destinosPopulares; track destino.nombre) {
      <div class="col-md-4 mb-4">
        
        <div class="card h-100 shadow-sm border-0" style="min-height: 180px;">
          
          <div class="card-body d-flex flex-column justify-content-between p-4">
            
            <div>
              <h4 class="card-title fw-bold mb-2">{{ destino.nombre }}</h4>
              <h6 class="card-subtitle text-muted fs-6">📍 {{ destino.pais }}</h6>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4 pt-3 border-top">
              <span class="badge bg-warning text-dark fs-6 shadow-sm">
                ⭐ {{ destino.calificacion }}
              </span>
              <span class="text-danger fw-bold fs-6">
                ❤️ {{ destino.favoritos }}
              </span>
            </div>

          </div>
        </div>
        
      </div>
    }

  </div>
</div>
