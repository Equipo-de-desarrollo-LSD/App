<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-fire text-danger"></i> Destinos Populares</h1>
        <button class="btn btn-outline-primary" routerLink="/ciudades">
            <i class="bi bi-search"></i> Buscar nuevos destinos
        </button>
    </div>

    <div *ngIf="loading" class="text-center my-5">
        <div class="spinner-border text-primary" role="status"></div>
    </div>

    <div *ngIf="errorMsg" class="alert alert-danger">{{ errorMsg }}</div>

    <div *ngIf="!loading && !errorMsg && destinosPopulares.length === 0" class="alert alert-info text-center">
        <i class="bi bi-info-circle fs-4 d-block mb-2"></i>
        Aún no hay destinos guardados en la base de datos.
    </div>

    <div class="row">
        <div class="col-md-4 mb-4" *ngFor="let destino of destinosPopulares">
            <div class="card h-100 shadow-sm">
                <img [src]="imagenesReales[destino.nombre] || getCityImage(destino)" class="card-img-top" [alt]="destino.nombre" style="height: 200px; object-fit: cover;">
                
                <div class="card-body">
                    <h5 class="card-title">{{ destino.nombre }}</h5>
                    <p class="card-text text-muted mb-2">
                        <i class="bi bi-geo-alt-fill"></i> {{ destino.pais || 'País no especificado' }}
                    </p>
                    <div class="text-warning mb-3">
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-fill"></i>
                        <i class="bi bi-star-half"></i>
                        <span class="text-dark ms-1 small">(4.5)</span>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0 pb-3">
                    <button class="btn btn-primary w-100" [routerLink]="['/ciudades', destino.nombre]">
                        Ver Detalles
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
