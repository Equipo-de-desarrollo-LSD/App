                <i class="bi bi-map"></i>
                Destinos
            </h1>
        </div>

<div class="search-section">
<div class="row mb-3">
                <div class="col-md-4">
                    <label for="searchText" class="fw-bold mb-1">Nombre de la Ciudad</label>
                    <input type="text" id="searchText" [(ngModel)]="searchText" placeholder="Ej: London" class="form-control" (input)="onBuscadorChange()" (keyup.enter)="buscar()">
                </div>
                
                <div class="col-md-4">
                    <label for="codigoPais" class="fw-bold mb-1">País</label>
                    <select id="codigoPais" [(ngModel)]="codigoPais" class="form-select form-control" (change)="onBuscadorChange()">
                        <option value="">Todos los países...</option>
                        <option value="AR">Argentina</option>
                        <option value="BR">Brasil</option>
                        <option value="CL">Chile</option>
                        <option value="CO">Colombia</option>
                        <option value="ES">España</option>
                        <option value="US">Estados Unidos</option>
                        <option value="MX">México</option>
                        <option value="UY">Uruguay</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label for="poblacionMinima" class="fw-bold mb-1">Población Mínima</label>
                    <input type="number" id="poblacionMinima" [(ngModel)]="poblacionMinima" placeholder="Ej: 1000000" class="form-control" (input)="onBuscadorChange()" (keyup.enter)="buscar()">
                </div>
            </div>
            
            <div class="search-actions text-end mt-3">
                <button class="btn btn-primary me-2" (click)="buscar()" [disabled]="loading">
                    <i class="bi bi-search"></i> Buscar
                </button>
                <button class="btn btn-secondary" (click)="limpiar()" [disabled]="loading">
                    <i class="bi bi-x-lg"></i> Limpiar
                </button>
            </div>
        </div>
            


        <div *ngIf="errorMsg" class="alert alert-danger">
            {{ errorMsg }}
        </div>

        <div class="loading-spinner" *ngIf="loading">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>
            Cargando...
        </div>

        <div class="destinos-grid"> 
            
            <div class="destino-card" *ngFor="let city of ciudades">
    
             <img [src]="imagenesReales[city.nombre] || getCityImage(city)" class="card-img-top" [alt]="city.nombre" style="height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; width: 100%;">

             <div class="card-content" style="padding: 15px;">
                
                <div class="card-content" style="padding: 15px;"> 
                    <div class="card-header">
                        <h3 class="destino-nombre">{{ city.nombre }}</h3>
                        
                        <span class="country-badge">
                            <i class="bi bi-geo-alt-fill"></i>
                            {{ city.pais }} 
                        </span>
                    </div>
                    
                    <div class="destino-details">
                        <div class="detail-item" *ngIf="city.latitud != null && city.longitud != null">
                            <i class="bi bi-pin-map-fill"></i>
                            <span class="value">
                                {{ city.latitud | number:'1.2-2' }}, {{ city.longitud | number:'1.2-2' }}
                            </span>
                        </div>
                    </div>
                    
                   <div class="d-grid gap-2 mt-3 pb-2">
                       <button class="btn btn-outline-primary" [routerLink]="['/ciudades', city.nombre]">
                         <i class="bi bi-info-circle"></i> Ver detalles
                        </button>
                        
                        <button class="btn btn-primary" (click)="verEnMapa(city)" [disabled]="city.latitud == null || city.longitud == null">
                            <i class="bi bi-map"></i> Ver en mapa
                        </button>
                        <button class="btn btn-success mt-2" (click)="guardarDestino(city)">
                            <i class="bi bi-bookmark-plus"></i> Guardar en BD
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="no-results" *ngIf="!loading && !errorMsg && ciudades.length === 0 && allCities.length === 0">
            <i class="bi bi-search"></i>
            <p>Escribe el nombre de una ciudad para comenzar la búsqueda</p>
        </div>

        <div class="no-results" *ngIf="!loading && !errorMsg && ciudades.length === 0 && allCities.length > 0">
            <i class="bi bi-search"></i>
            <p>No se encontraron destinos con esos filtros</p>
        </div>

        <div class="pagination" *ngIf="!loading && !errorMsg && totalPages > 1">
            <button 
                class="pagination-btn"
                [disabled]="currentPage === 1"
                (click)="goToFirstPage()"
                title="Primera página"
            >
                «
            </button>
            
            <button 
                class="pagination-btn"
                [disabled]="currentPage === 1"
                (click)="goToPage(currentPage - 1)"
                title="Página anterior"
            >
                ‹
            </button>
            
            <button 
                *ngFor="let page of getPaginationPages()"
                class="pagination-btn"
                [class.active]="page === currentPage"
                (click)="goToPage(page)"
            >
                {{ page }}
            </button>
            
            <button 
                class="pagination-btn"
                [disabled]="currentPage === totalPages"
                (click)="goToPage(currentPage + 1)"
                title="Página siguiente"
            >
                ›
            </button>
            
            <button 
                class="pagination-btn"
                [disabled]="currentPage === totalPages"
                (click)="goToLastPage()"
                title="Última página"
            >
                »
            </button>
        </div>
    </div>
